<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cookies-Consent</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="cookies-container" id="cookiesConsent">
    <div class="cookies-card">
      <span class="cookies-icon">🍪</span>
      <p>use cookies for more experience</p>
      <button class="btn-yes" id="acceptCookies">Yes</button>
      <button class="btn-no" id="closeCookies">No</button>
    </div>
  </div>
  <script src="main.js"></script>
</body>
</html
